<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Admin Login — Carlo Ebora</title>
  <link rel="icon" href="../../favicon.ico">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body>
  <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <h1>◈ Blog Admin</h1>
        <p>Sign in to manage blog posts</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-input" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          <span>Sign In</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>
      <div style="margin-top:16px;text-align:center">
        <a href="../dashboard.html" style="font-size:0.82rem;color:var(--muted)">Portfolio Admin →</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://carlo-portfolio-api.johncarloebora.workers.dev';

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type || 'info') + ' show';
      clearTimeout(t._tid);
      t._tid = setTimeout(() => t.classList.remove('show'), 4000);
    }

    // If already logged in go straight to blog admin
    if (sessionStorage.getItem('admin_token')) {
      window.location.href = 'index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) { showToast('Please fill in all fields', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';

      try {
        const res = await fetch(API_BASE + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!res.ok) { showToast(data.error || 'Login failed', 'error'); return; }

        sessionStorage.setItem('admin_token', data.token);
        showToast('Login successful!', 'success');
        setTimeout(() => window.location.href = 'index.html', 400);
      } catch {
        showToast('Network error. Check your connection.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>Sign In</span><i class="fas fa-arrow-right"></i>';
      }
    });
  </script>
</body>
</html>
