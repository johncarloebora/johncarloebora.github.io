name = "carlo-portfolio-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
# Replace with your actual R2 public URL after enabling public access
R2_PUBLIC_URL = "https://pub-f5b0f09119db40a8996c7447f85b44f9.r2.dev"
# Comma-separated list of allowed CORS origins (no trailing slash)
ALLOWED_ORIGIN = "https://johncarloebora.github.io,https://carlo-portfolio.pages.dev,http://localhost:5500,http://127.0.0.1:5500"
# Base URL for the admin panel (used for password-reset email links)
ADMIN_ORIGIN = "https://johncarloebora.github.io"
# EmailJS config for password reset emails
EMAILJS_SERVICE_ID = "service_ansc2g4"
# Template used for general contact emails
EMAILJS_TEMPLATE_ID = "template_g5u73sh"
# Template used specifically for password-reset emails (falls back to EMAILJS_TEMPLATE_ID if unset)
EMAILJS_RESET_TEMPLATE_ID = "template_g5u73sh"
EMAILJS_PUBLIC_KEY = "l9FengsYbeILidGxh"
# Admin email address — only this address receives password-reset emails
ADMIN_EMAIL = "johncarloebora@outlook.com"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "carlo-portfolio-db"
database_id = "3fc49db4-9c8c-4716-b282-4390f23f82b2"

# R2 Bucket binding
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "carlo-portfolio-media"

# Secrets (set via `wrangler secret put <KEY>` — never commit these):
#   JWT_SECRET        — signing key for admin JWT tokens
#   EMAILJS_PRIVATE_KEY — EmailJS access token for server-side sends
